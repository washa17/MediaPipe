<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ServeBot — Controle por Gestos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #00f5a0;
    --accent2: #00c8ff;
    --danger: #ff3b5c;
    --warn: #ffb300;
    --text: #e0e0f0;
    --muted: #555570;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
  }
  .logo span { color: var(--accent2); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    transition: all 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
  .status-dot.danger { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .mqtt-badge { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  main { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 10px; overflow: hidden; }

  .video-wrap {
    position: relative; width: 100%;
    border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border); background: #000; flex-shrink: 0;
  }
  #videoEl { width: 100%; display: block; transform: scaleX(-1); max-height: 38vh; object-fit: cover; }
  #canvasEl { position: absolute; top:0; left:0; width:100%; height:100%; transform: scaleX(-1); }

  .scan-line {
    position: absolute; top:0; left:0; right:0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2s linear infinite; pointer-events: none;
  }
  @keyframes scan { 0%{top:0%} 100%{top:100%} }

  .video-overlay { position: absolute; top:8px; left:8px; font-size:9px; color:var(--accent); text-transform:uppercase; letter-spacing:2px; opacity:0.7; }
  .corner { position:absolute; width:16px; height:16px; border-color:var(--accent); border-style:solid; opacity:0.6; }
  .corner.tl { top:8px; left:8px; border-width:2px 0 0 2px; }
  .corner.tr { top:8px; right:8px; border-width:2px 2px 0 0; }
  .corner.bl { bottom:8px; left:8px; border-width:0 0 2px 2px; }
  .corner.br { bottom:8px; right:8px; border-width:0 2px 2px 0; }

  /* DEDOS COUNTER */
  .dedos-strip {
    display: flex; gap: 6px; flex-shrink: 0;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    align-items: center;
  }
  .dedos-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .dedo-dot {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--border); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--muted); transition: all 0.15s;
    font-weight: 700;
  }
  .dedo-dot.on { background: var(--accent); color: var(--bg); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dedos-num {
    margin-left: auto;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; color: var(--accent);
    line-height: 1; min-width: 32px; text-align: right;
    text-shadow: 0 0 12px var(--accent);
  }

  /* GESTO CARD */
  .gesto-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0; transition: border-color 0.2s;
  }
  .gesto-card.active { border-color: var(--accent); }
  .gesto-card.danger { border-color: var(--danger); }
  .gesto-card.warn   { border-color: var(--warn); }

  .gesto-icon { font-size: 42px; line-height: 1; flex-shrink: 0; }
  .gesto-info { flex: 1; min-width: 0; }
  .gesto-nome {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px; color: var(--accent);
    line-height: 1; transition: color 0.2s;
  }
  .gesto-acao { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .dir-visual {
    display: grid; grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(3,1fr); gap: 3px;
    width: 70px; height: 70px; flex-shrink: 0;
  }
  .dir-cell {
    border-radius: 4px; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--muted); transition: all 0.15s;
  }
  .dir-cell.on { background: var(--accent); color: var(--bg); box-shadow: 0 0 6px var(--accent); }
  .dir-cell.center { background: var(--panel); border: 1px solid var(--border); }
  .dir-cell.stop { background: var(--danger) !important; box-shadow: 0 0 8px var(--danger) !important; color: #fff !important; }

  /* GRID REFERÊNCIA */
  .ref-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; flex-shrink: 0; }
  .gestos-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; flex-shrink: 0;
  }
  .gesto-item {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 4px; text-align: center; transition: all 0.2s;
  }
  .gesto-item.hl   { border-color: var(--accent); background: rgba(0,245,160,0.07); box-shadow: 0 0 10px rgba(0,245,160,0.15); }
  .gesto-item.hl-d { border-color: var(--danger); background: rgba(255,59,92,0.07); }
  .gesto-item.hl-w { border-color: var(--warn);   background: rgba(255,179,0,0.07); }
  .gi-emoji { font-size: 20px; display: block; margin-bottom: 3px; }
  .gi-dedos { font-size: 8px; color: var(--muted); }
  .gi-cmd { font-size: 10px; color: var(--text); font-weight: 700; margin-top: 1px; }

  /* LOG */
  .log-wrap {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    flex: 1; overflow-y: auto; min-height: 40px;
  }
  .log-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
  .log-entry { font-size: 10px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; gap: 8px; }
  .log-time { color: var(--accent2); flex-shrink: 0; }
  .log-msg { color: var(--muted); }
  .log-entry.ln .log-msg { color: var(--accent); }

  /* LOADING */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 100; transition: opacity 0.5s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loader-logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 6px; color: var(--accent); text-shadow: 0 0 30px var(--accent); }
  .loader-bar { width: 200px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .loader-fill { height: 100%; background: var(--accent); animation: load 2s ease forwards; box-shadow: 0 0 10px var(--accent); }
  @keyframes load { 0%{width:0%} 100%{width:100%} }
  .loader-txt { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-logo">SERVE<span style="color:var(--accent2)">BOT</span></div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-txt">Carregando MediaPipe...</div>
</div>

<header>
  <div class="logo">SERVE<span>BOT</span></div>
  <div class="mqtt-badge"><div class="status-dot" id="camDot"></div><span>câmera</span></div>
  <div class="mqtt-badge"><div class="status-dot" id="handDot"></div><span id="handLabel">mão</span></div>
</header>

<main>

  <!-- VIDEO -->
  <div class="video-wrap">
    <video id="videoEl" playsinline autoplay muted></video>
    <canvas id="canvasEl"></canvas>
    <div class="scan-line"></div>
    <div class="video-overlay">● GESTOS ATIVOS</div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <!-- CONTADOR DE DEDOS -->
  <div class="dedos-strip">
    <span class="dedos-label">Dedos</span>
    <div class="dedo-dot" id="d1">1</div>
    <div class="dedo-dot" id="d2">2</div>
    <div class="dedo-dot" id="d3">3</div>
    <div class="dedo-dot" id="d4">4</div>
    <div class="dedo-dot" id="d5">5</div>
    <div class="dedos-num" id="dedosNum">—</div>
  </div>

  <!-- GESTO ATUAL -->
  <div class="gesto-card" id="gestoCard">
    <div class="gesto-icon" id="gestoIcon">🖐️</div>
    <div class="gesto-info">
      <div class="gesto-nome" id="gestoNome">AGUARDANDO</div>
      <div class="gesto-acao" id="gestoAcao">Mostre sua mão para a câmera</div>
    </div>
    <div class="dir-visual">
      <div class="dir-cell"></div>
      <div class="dir-cell" id="dc-t">↑</div>
      <div class="dir-cell"></div>
      <div class="dir-cell" id="dc-l">←</div>
      <div class="dir-cell center" id="dc-c">●</div>
      <div class="dir-cell" id="dc-r">→</div>
      <div class="dir-cell"></div>
      <div class="dir-cell" id="dc-b">↓</div>
      <div class="dir-cell"></div>
    </div>
  </div>

  <!-- REFERÊNCIA -->
  <div class="ref-title">▸ Referência de gestos</div>
  <div class="gestos-grid">
    <div class="gesto-item" id="gi-1"><span class="gi-emoji">☝️</span><div class="gi-dedos">1 dedo</div><div class="gi-cmd">FRENTE</div></div>
    <div class="gesto-item" id="gi-2"><span class="gi-emoji">✌️</span><div class="gi-dedos">2 dedos</div><div class="gi-cmd">RÉ</div></div>
    <div class="gesto-item" id="gi-3"><span class="gi-emoji">🤟</span><div class="gi-dedos">3 dedos</div><div class="gi-cmd">ESQUERDA</div></div>
    <div class="gesto-item" id="gi-4"><span class="gi-emoji">🖖</span><div class="gi-dedos">4 dedos</div><div class="gi-cmd">DIREITA</div></div>
    <div class="gesto-item" id="gi-5"><span class="gi-emoji">✋</span><div class="gi-dedos">5 dedos</div><div class="gi-cmd">PARAR</div></div>
    <div class="gesto-item" id="gi-0"><span class="gi-emoji">✊</span><div class="gi-dedos">0 dedos</div><div class="gi-cmd">PRATELEIRA</div></div>
  </div>

  <!-- LOG -->
  <div class="log-wrap">
    <div class="log-title">▸ Log MQTT</div>
    <div id="logEntries"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const DEMO_MODE = true;

// Elementos
const videoEl   = document.getElementById('videoEl');
const canvasEl  = document.getElementById('canvasEl');
const ctx       = canvasEl.getContext('2d');
const camDot    = document.getElementById('camDot');
const handDot   = document.getElementById('handDot');
const handLabel = document.getElementById('handLabel');
const gestoCard = document.getElementById('gestoCard');
const gestoIcon = document.getElementById('gestoIcon');
const gestoNome = document.getElementById('gestoNome');
const gestoAcao = document.getElementById('gestoAcao');
const dedosNum  = document.getElementById('dedosNum');
const logEntries= document.getElementById('logEntries');

const dedoDots = [
  document.getElementById('d1'),
  document.getElementById('d2'),
  document.getElementById('d3'),
  document.getElementById('d4'),
  document.getElementById('d5'),
];

const dc = {
  t: document.getElementById('dc-t'),
  b: document.getElementById('dc-b'),
  l: document.getElementById('dc-l'),
  r: document.getElementById('dc-r'),
  c: document.getElementById('dc-c'),
};

const giItems = {
  0: document.getElementById('gi-0'),
  1: document.getElementById('gi-1'),
  2: document.getElementById('gi-2'),
  3: document.getElementById('gi-3'),
  4: document.getElementById('gi-4'),
  5: document.getElementById('gi-5'),
};

// Mapa de gestos por número de dedos
const GESTOS = {
  '-1': { icon:'🖐️', nome:'AGUARDANDO',  acao:'Mostre sua mão para a câmera', cmd:null,        tipo:'',       dir:'none' },
   0:   { icon:'✊',  nome:'PRATELEIRA',  acao:'Abrindo/fechando prateleira',  cmd:'prateleira', tipo:'warn',   dir:'none' },
   1:   { icon:'☝️', nome:'AVANÇAR',     acao:'Robô indo para frente',        cmd:'frente',     tipo:'active', dir:'t'    },
   2:   { icon:'✌️', nome:'RÉ',           acao:'Robô recuando',               cmd:'re',          tipo:'active', dir:'b'    },
   3:   { icon:'🤟', nome:'ESQUERDA',    acao:'Robô virando à esquerda',      cmd:'esquerda',   tipo:'active', dir:'l'    },
   4:   { icon:'🖖', nome:'DIREITA',     acao:'Robô virando à direita',       cmd:'direita',    tipo:'active', dir:'r'    },
   5:   { icon:'✋', nome:'PARAR',       acao:'Parada de emergência',         cmd:'parar',      tipo:'danger', dir:'stop' },
};

// Contagem de dedos — método robusto
function contarDedos(lm) {
  // Usa eixo Y: ponta mais alta que a base = dedo aberto
  // Pontas:  4=polegar, 8=indicador, 12=médio, 16=anelar, 20=mínimo
  // Bases:   3=polegar, 5=indicador, 9=médio,  13=anelar, 17=mínimo

  let count = 0;

  // Polegar: usa eixo X porque é lateral
  // Se ponta do polegar está mais longe do centro que a base = aberto
  const centroX = (lm[5].x + lm[17].x) / 2;
  const polgarAberto = Math.abs(lm[4].x - centroX) > Math.abs(lm[3].x - centroX) + 0.02;
  if (polgarAberto) count++;

  // Outros 4 dedos: eixo Y (ponta acima da base = aberto)
  const dedosPares = [[8,6],[12,10],[16,14],[20,18]];
  for (const [tip, pip] of dedosPares) {
    if (lm[tip].y < lm[pip].y - 0.02) count++;
  }

  return count;
}

// Suavização: mantém gesto por N frames antes de confirmar
let bufferGesto = [];
const BUFFER_SIZE = 5;

function gestoSuavizado(novoGesto) {
  bufferGesto.push(novoGesto);
  if (bufferGesto.length > BUFFER_SIZE) bufferGesto.shift();
  // Retorna o gesto mais frequente no buffer
  const freq = {};
  for (const g of bufferGesto) freq[g] = (freq[g] || 0) + 1;
  return Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0];
}

function atualizarDedos(n) {
  dedosNum.textContent = n >= 0 ? n : '—';
  dedoDots.forEach((d, i) => {
    d.classList.toggle('on', i < n);
  });
}

function atualizarUI(key) {
  const g = GESTOS[key] ?? GESTOS[-1];
  gestoIcon.textContent = g.icon;
  gestoNome.textContent = g.nome;
  gestoAcao.textContent = g.acao;

  const corMap = { active: 'var(--accent)', danger: 'var(--danger)', warn: 'var(--warn)', '': 'var(--accent)' };
  gestoNome.style.color = corMap[g.tipo];

  gestoCard.className = 'gesto-card';
  if (g.tipo === 'active') gestoCard.classList.add('active');
  if (g.tipo === 'danger') gestoCard.classList.add('danger');
  if (g.tipo === 'warn')   gestoCard.classList.add('warn');

  Object.values(dc).forEach(c => c.classList.remove('on','stop'));
  if (g.dir === 't') dc.t.classList.add('on');
  else if (g.dir === 'b') dc.b.classList.add('on');
  else if (g.dir === 'l') dc.l.classList.add('on');
  else if (g.dir === 'r') dc.r.classList.add('on');
  else if (g.dir === 'stop') dc.c.classList.add('stop');

  Object.keys(giItems).forEach(k => {
    giItems[k].className = 'gesto-item';
    if (parseInt(k) === parseInt(key)) {
      if (g.tipo === 'danger') giItems[k].classList.add('hl-d');
      else if (g.tipo === 'warn') giItems[k].classList.add('hl-w');
      else giItems[k].classList.add('hl');
    }
  });
}

function addLog(msg, isNew=true) {
  const t = new Date().toTimeString().slice(0,8);
  const el = document.createElement('div');
  el.className = 'log-entry' + (isNew ? ' ln' : '');
  el.innerHTML = `<span class="log-time">${t}</span><span class="log-msg">${msg}</span>`;
  logEntries.prepend(el);
  if (logEntries.children.length > 15) logEntries.lastChild.remove();
  setTimeout(() => el.classList.remove('ln'), 1200);
}

let lastCmd = null;
let handDetected = false;

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.75,
  minTrackingConfidence: 0.7,
});

hands.onResults(results => {
  canvasEl.width  = videoEl.videoWidth  || videoEl.offsetWidth;
  canvasEl.height = videoEl.videoHeight || videoEl.offsetHeight;
  ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    if (!handDetected) {
      handDetected = true;
      handDot.className = 'status-dot active';
      handLabel.textContent = 'mão ✓';
    }

    const lm = results.multiHandLandmarks[0];

    // Desenha esqueleto
    if (window.drawConnectors && window.HAND_CONNECTIONS) {
      drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: 'rgba(0,245,160,0.3)', lineWidth: 2 });
    }
    if (window.drawLandmarks) {
      drawLandmarks(ctx, lm, {
        color: '#00f5a0',
        fillColor: 'rgba(0,200,255,0.9)',
        lineWidth: 1,
        radius: 5
      });
    }

    const n = contarDedos(lm);
    const gestoConfirmado = parseInt(gestoSuavizado(n));

    atualizarDedos(n);
    atualizarUI(gestoConfirmado);

    const g = GESTOS[gestoConfirmado];
    if (g && g.cmd && g.cmd !== lastCmd) {
      lastCmd = g.cmd;
      addLog(`[DEMO] → servebot/controle: ${g.cmd.toUpperCase()}`);
    }

  } else {
    if (handDetected) {
      handDetected = false;
      handDot.className = 'status-dot';
      handLabel.textContent = 'mão';
      bufferGesto = [];
      lastCmd = null;
      atualizarDedos(-1);
      atualizarUI(-1);
    }
  }
});

async function iniciarCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    videoEl.srcObject = stream;
    camDot.className = 'status-dot active';

    const camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 640, height: 480
    });
    camera.start();

    addLog('Câmera iniciada', false);
    addLog('MediaPipe Hands ativo', false);
    addLog('[DEMO MODE] MQTT simulado', false);
  } catch(e) {
    camDot.className = 'status-dot danger';
    addLog('ERRO: ' + e.message);
  }
}

window.addEventListener('load', () => {
  atualizarUI(-1);
  atualizarDedos(-1);
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hidden');
    iniciarCamera();
  }, 2000);
});
</script>
</body>
</html>
